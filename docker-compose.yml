services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    user: root
    ports:
      # Port for PLAINTEXT clients on your host machine
      - "9092:9092"
      # Port for future SSL clients on your host machine
      # - "9093:9093"
    volumes:
      # Persist Kafka data
      - kafka_data:/tmp/kafka-logs
      # Mount your security files into the container when you enable SSL/SASL
      # - ./security:/opt/kafka/security
    environment:
      # ========================================================================
      # === KRaft Configuration (ZooKeeper-less setup) =========================
      # ========================================================================
      PATH: /opt/kafka/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # The format for QUORUM_VOTERS is NodeID@Host:Port
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'

      # --- Listeners Configuration (Currently PLAINTEXT only) ---
      KAFKA_LISTENERS: 'INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'

      # --- Cluster ID ---
      CLUSTER_ID: 'aCL3Gg_TTpOVLesSOBfyFA'

      # ==================
      # Topic Auto-Creation Settings
      # ==================
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # Default partitions for auto-created topics
      KAFKA_NUM_PARTITIONS: 10

      # ==================
      # Data Retention Settings
      # ==================
      # 2-hour retention period (in milliseconds: 2 * 60 * 60 * 1000 = 7200000)
      KAFKA_LOG_RETENTION_MS: '7200000'

      # ==================
      # Other Recommendations
      # ==================
      # The default replication factor for auto-created topics.
      # Must be 1 for a single-node cluster.
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # A single-node cluster cannot have unclean leader election.
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: 'false'
      # Set minimum in-sync replicas to 1.
      KAFKA_MIN_INSYNC_REPLICAS: 1
      # ========================================================================
      # === Placeholder for Future SSL & Auth Configuration ====================
      # ========================================================================

      # --- 1. SSL Encryption Configuration (Uncomment to enable) ---
      # Adjust listeners to include an SSL port
      # KAFKA_CFG_LISTENERS: 'INTERNAL://:29092,EXTERNAL_SSL://:9093,CONTROLLER://:9094'
      # KAFKA_CFG_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL_SSL://localhost:9093'
      # KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL_SSL:SSL,CONTROLLER:PLAINTEXT'
      # KAFKA_CFG_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      # KAFKA_CFG_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: 'https'
      #
      # # Keystore (contains the broker's private key and certificate)
      # KAFKA_CFG_SSL_KEYSTORE_TYPE: 'JKS'
      # KAFKA_CFG_SSL_KEYSTORE_LOCATION: '/opt/kafka/security/kafka.keystore.jks'
      # KAFKA_CFG_SSL_KEYSTORE_PASSWORD: 'your_keystore_password'
      # KAFKA_CFG_SSL_KEY_PASSWORD: 'your_key_password'
      #
      # # Truststore (contains certificates of trusted clients/CAs)
      # KAFKA_CFG_SSL_TRUSTSTORE_TYPE: 'JKS'
      # KAFKA_CFG_SSL_TRUSTSTORE_LOCATION: '/opt/kafka/security/kafka.truststore.jks'
      # KAFKA_CFG_SSL_TRUSTSTORE_PASSWORD: 'your_truststore_password'
      # # Use 'required' to enforce client certificate authentication (mTLS)
      # KAFKA_CFG_SSL_CLIENT_AUTH: 'none'

      # --- 2. SASL_SSL Authentication (Uncomment to enable) ---
      # Requires SSL to be configured first as above.
      # KAFKA_CFG_SASL_MECHANISM_INTER_BROKER_PROTOCOL: 'PLAIN'
      # KAFKA_CFG_SASL_ENABLED_MECHANISMS: 'PLAIN'
      # KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:SASL_SSL,EXTERNAL_SSL:SASL_SSL,CONTROLLER:PLAINTEXT'
      # # Add a JAAS configuration file for the broker
      # KAFKA_OPTS: '-Djava.security.auth.login.config=/opt/kafka/security/kafka_jaas.conf'

  kafbat:
    image: kafbat/kafka-ui:latest
    container_name: kafbat
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    # Mount your truststore/keystore if connecting to a secured Kafka cluster
    # volumes:
    #   - ./security:/opt/kafbat/security
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: 'local-kafka-4.0.0'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:29092'
      # ========================================================================
      # === Placeholder for Future SSL & Auth Configuration ====================
      # ========================================================================

      # --- 1. SSL Connection to Broker (Uncomment to enable) ---
      # KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: 'kafka:9093' # Change to the SSL port
      # KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: 'SSL'
      # # Truststore for validating the broker's certificate
      # KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_LOCATION: '/opt/kafbat/security/kafka.truststore.jks'
      # KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: 'your_truststore_password'
      # # Keystore if mTLS (client auth) is required by the broker
      # KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_LOCATION: '/opt/kafbat/security/kafka.keystore.jks'
      # KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_PASSWORD: 'your_keystore_password'

      # --- 2. SASL_SSL Authentication to Broker (Uncomment to enable) ---
      # KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: 'SASL_SSL'
      # KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: 'PLAIN'
      # KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="kafbat_user" password="kafbat_password";'
      # # SSL settings (from above) are still required for SASL_SSL
      # KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_LOCATION: '/opt/kafbat/security/kafka.truststore.jks'
      # KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: 'your_truststore_password'

