syntax = "proto3";

package ecgstream;

// ─────────────────────────────────────────────
// SERVICE
// ─────────────────────────────────────────────

service ECGService {
  // Bi-directional stream: Client sends ECGData chunks, Server sends ArrhythmiaAlerts.
  // Normal sinus rhythm produces no alert — silence means healthy.
  rpc StreamECG (stream ECGData) returns (stream ArrhythmiaAlert);
}

// ─────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────

message ECGData {
  repeated double values = 1; // ECG voltage samples (mV). Any chunk size is accepted.
  string device_id     = 2;   // Unique device/monitor identifier
  int64  timestamp     = 3;   // Unix timestamp of this chunk (milliseconds)
  int32  sample_rate   = 4;   // Sampling rate of the device (e.g. 125, 250, 500 Hz)
}

// ─────────────────────────────────────────────
// XAI SUB-MESSAGES
// ─────────────────────────────────────────────

// Single beat-level prediction (one entry per detected R-peak)
// Used by both rhythm and ectopy models — common structure for any per-beat annotation
message BeatEvent {
  int32  beat_idx     = 1; // Sequential beat index in the 10s window (0-based)
  int32  peak_sample  = 2; // Sample position of the R-peak within the segment
  string label        = 3; // Beat class: "None" | "PVC" | "PAC"
  float  confidence   = 4; // Model confidence for this beat (0.0 – 1.0)
  int32  start_pos    = 5; // Start sample position of beat window (peak_sample - 0.3*fs)
  int32  end_pos      = 6; // End sample position of beat window   (peak_sample + 0.3*fs)
}

// Ectopy model output for the full 10s window
message EctopyResult {
  string             label        = 1; // Dominant ectopy label for the segment
  float              confidence   = 2; // Confidence of the dominant label (0.0 – 1.0)
  repeated BeatEvent beat_events  = 3; // Per-beat predictions (one per R-peak)
}

// Rhythm model output for the full 10s window
message RhythmResult {
  string            label                = 1; // Predicted rhythm class
  float             confidence           = 2; // Confidence of predicted class (0.0 – 1.0)
  map<string,float> class_probabilities  = 3; // Probability for all 14 rhythm classes
  string            transformer_attention = 4; // Human-readable attention focus description
}

// Full explainability block attached to each ArrhythmiaAlert
message XAIExplanation {
  RhythmResult    rhythm            = 1; // Rhythm model output + attention
  EctopyResult    ectopy            = 2; // Ectopy model output + per-beat results
  repeated float  saliency          = 3; // Gradient saliency map (1250 values, normalised 0–1)
  string          clinical_reasoning = 4; // Plain-English clinical summary generated by the AI
}

// ─────────────────────────────────────────────
// OUTPUT
// ─────────────────────────────────────────────

message ArrhythmiaAlert {
  string          arrhythmia_type = 1; // Detected class (e.g. "Atrial Fibrillation", "PVC Bigeminy")
  float           confidence      = 2; // Detection confidence (0.0 – 1.0)
  string          message         = 3; // Human-readable: "[device_id] <type> detected (HR: X bpm)"
  int64           timestamp       = 4; // Echo of the input ECGData timestamp (milliseconds)
  XAIExplanation  xai             = 5; // AI explainability block (always populated)
}
